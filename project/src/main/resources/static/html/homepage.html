<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/homepage.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <section class="hero-section">
            <div class="section-content">
                <div class="hero-details">
                    <h2 class="title">Welcome to Your Meal Plan</h2>
                    <h3 class="subtitle">Weekly Calendar & Recipe Management</h3>
                </div>
                <div class="buttons">
                    <button id="create-weekly-plan" class="button">Modify Weekly Plan</button>
                </div>
            </div>
        </section>
        <section class="calendar-section">
            <div class="section-content">
                <div class="calendar-header">
                    <button id="prev-week" class="week-buttons"><i class="fas fa-chevron-left"></i> Previous Week</button>
                    <div id="week-range">[Date]–[Date]</div>
                    <button id="next-week" class="week-buttons">Next Week <i class="fas fa-chevron-right"></i></button>
                </div>
                <div class="calendar-days">
                    <div class="day">Meal Types</div>
                    <div class="day">Sun</div>
                    <div class="day">Mon</div>
                    <div class="day">Tue</div>
                    <div class="day">Wed</div>
                    <div class="day">Thu</div>
                    <div class="day">Fri</div>
                    <div class="day">Sat</div>
                
                    <div class="meal">Breakfast</div>
                    <div class="cell" id="sun-breakfast"></div>
                    <div class="cell" id="mon-breakfast"></div>
                    <div class="cell" id="tue-breakfast"></div>
                    <div class="cell" id="wed-breakfast"></div>
                    <div class="cell" id="thu-breakfast"></div>
                    <div class="cell" id="fri-breakfast"></div>
                    <div class="cell" id="sat-breakfast"></div>

                    <div class="meal">Morning Snack</div>
                    <div class="cell" id="sun-morning"></div>
                    <div class="cell" id="mon-morning"></div>
                    <div class="cell" id="tue-morning"></div>
                    <div class="cell" id="wed-morning"></div>
                    <div class="cell" id="thu-morning"></div>
                    <div class="cell" id="fri-morning"></div>
                    <div class="cell" id="sat-morning"></div>

                    <div class="meal">Lunch</div>
                    <div class="cell" id="sun-lunch"></div>
                    <div class="cell" id="mon-lunch"></div>
                    <div class="cell" id="tue-lunch"></div>
                    <div class="cell" id="wed-lunch"></div>
                    <div class="cell" id="thu-lunch"></div>
                    <div class="cell" id="fri-lunch"></div>
                    <div class="cell" id="sat-lunch"></div>

                    <div class="meal">Afternoon Snack</div>
                    <div class="cell" id="sun-afternoon"></div>
                    <div class="cell" id="mon-afternoon"></div>
                    <div class="cell" id="tue-afternoon"></div>
                    <div class="cell" id="wed-afternoon"></div>
                    <div class="cell" id="thu-afternoon"></div>
                    <div class="cell" id="fri-afternoon"></div>
                    <div class="cell" id="sat-afternoon"></div>

                    <div class="meal">Dinner</div>
                    <div class="cell" id="sun-dinner"></div>
                    <div class="cell" id="mon-dinner"></div>
                    <div class="cell" id="tue-dinner"></div>
                    <div class="cell" id="wed-dinner"></div>
                    <div class="cell" id="thu-dinner"></div>
                    <div class="cell" id="fri-dinner"></div>
                    <div class="cell" id="sat-dinner"></div>

                    <div class="meal">Night Snack</div>
                    <div class="cell" id="sun-night"></div>
                    <div class="cell" id="mon-night"></div>
                    <div class="cell" id="tue-night"></div>
                    <div class="cell" id="wed-night"></div>
                    <div class="cell" id="thu-night"></div>
                    <div class="cell" id="fri-night"></div>
                    <div class="cell" id="sat-night"></div>
                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>

    <script type="module" src="/js/homepage.js"></script>
</body>
</html>
