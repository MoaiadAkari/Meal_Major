<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/recipes.css">
</head>
<body>
    <div id="header"></div>
    <main>
        <section class="hero-section">
            <div class="section-content">
                <div class="hero-details">
                    <h2 class="title">Create Your Own Recipes</h2>
                    <h3 class="subtitle">Search for and manage all your recipes</h3>
                </div>
                <div class="buttons">
                    <a href="/html/addRecipe.html" class="button">Create Recipe</a>
                </div>
            </div>
        </section>
        <section class="recipes-section">
            <div class="search-bar">
                    <input id= "search-bar" type="text" placeholder="Search for recipes...">
                    <button id="search-button" class="fas fa-search"></button>
                    <button id="filter-open-button" class="fas fa-filter"></button>
                </div>
            <div class="section-content">
                <h2 class="section-title" id="recipe-cards-title">Featured Recipes</h2>
                <div href="/html/displayRecipes.html" id="recipe-container" class="recipe-container">
                    <!-- Recipe cards will be dynamically inserted here -->
                </div>
            </div>
        </section>
    </main>
    <div id="footer"></div>

    <script type="module" src="/js/recipes.js"></script>
    <div id="filter-popout"></div>
    <div id="filter-sidebar">
        <div class="filter-header">
            <h3>Search Filters</h3>
            <button id="filter-close" class="fas fa-times"></button>
        </div>
        <div class="filter-content">

    <h4>Max Total Time (prep and cooking)</h4>
    <select id="filter-time">
        <option value="">Any</option>
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="60">60 min</option>
    </select>

    <h4>Difficulty</h4>
    <select id="filter-difficulty">
        <option value="">Any</option>
        <option value="Beginner">Beginner</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
        <option value="Expert">Expert</option>
    </select>

    <h4>Max Cost</h4>
    <select id="filter-cost">
        <option value="">Any</option>
        <option value="10">$10</option>
        <option value="20">$20</option>
        <option value="50">$50</option>
    </select>

    <h4>Preferences</h4>
    <!-- <select id="filter-diet" multiple> -->
        <select id="filter-diet" multiple></select>
        <!-- <option value="VEGAN">Vegan</option>
        <option value="VEGETARIAN">Vegetarian</option>
        <option value="GLUTEN_FREE">Gluten-Free</option>
        <option value="DAIRY_FREE">Dairy-Free</option> -->
    </select>

    <button id="apply-filters" class="apply-btn">
        Apply Filters
    </button>

</div>
    </div>
</body>
</html>
