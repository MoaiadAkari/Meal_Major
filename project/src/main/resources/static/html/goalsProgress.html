<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goal Progress</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="/css/goalsProgress.css">
</head>
<body>

<div id="header"></div>

<main class="goalprogress-page">
    <section class="goalprogress-card">
        <h1 class="page-title">Cheat Day Goal Progress</h1>
        <p class="page-subtitle">Complete your goal to unlock your cheat day dessert.</p>

        <div id="goal-progress-content">
            <p>Loading goal progress...</p>
        </div>
    </section>

    <section id="reward-section" class="reward-section hidden">
        <h2>Your Cheat Day Reward 🎉</h2>
        <div id="reward-card"></div>
    </section>
</main>

<div id="footer"></div>

<script type="module" src="/js/goalsProgress.js"></script>

</body>
</html>
