name : CI Pipeline

on: 
  push:
    branches: 
      - "**"
  pull_request: 
    branches : 
      - "main"

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with: 
          distribution: 'temurin'
          java-version: '17'
      - name: Build and test project
        working-directory: project
        run: ./mvnw clean test
  
  integration-tests:  
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    
    services:
      postgres:
        image: postgres:16 
        env: 
          POSTGRES_USER: soen341_admin
          POSTGRES_PASSWORD: SOEN341
          POSTGRES_DB: soen341 
        ports: 
          - 5432:5432 
        options: >- 
          --health-cmd="pg_isready -U soen341_admin" 
          --health-interval=10s 
          --health-timeout=5s 
          --health-retries=5
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with: 
          distribution: 'temurin'
          java-version: '17'
      - name: Wait for Postgres 
        run: | 
          until pg_isready -h localhost -p 5432 -U soen341_admin; do 
            echo "Waiting for Postgres..." 
            sleep 1 
          done
      - name: Build and test project
        working-directory: project
        run: ./mvnw clean verify
